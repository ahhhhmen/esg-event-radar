name: ESG Event Radar Weekly Scan

# 每周一 UTC 00:00 自动运行（北京时间周一早上 08:00）
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    # 允许在 GitHub 网页端手动点击运行

jobs:
  run-event-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    # 1. 检出仓库代码
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 2. 部署 Python 环境
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    # 3. 安装依赖
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. 执行 ESG 会议雷达扫描（生成 .ics + 写 Notion + 推钉钉）
    - name: Run ESG Event Radar
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        DINGTALK_WEBHOOK_RADAR: ${{ secrets.DINGTALK_WEBHOOK_RADAR }}
      run: |
        python event_radar_agent.py

    # 5. 将生成的 .ics 日历文件回传至仓库（可按需开启 GitHub Pages 提供订阅）
    - name: Commit and Push ICS Calendar
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add esg_events.ics
        git diff-index --quiet HEAD || git commit -m "🤖 每周自动更新: ESG 会议日历 ICS ($(date +'%Y-%m-%d'))"
        git push
