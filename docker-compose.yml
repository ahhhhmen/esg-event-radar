version: "3.8"

services:
  event-radar-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event-radar-agent
    image: event-radar-agent:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # 持久化数据与日志目录
      - ./data:/app/data
      - ./logs:/app/logs
      # .ics 日历输出 — 直接挂载到宿主机当前目录
      - ./output:/app/output
    environment:
      - SCHEDULE_INTERVAL_HOURS=12
      - LOG_LEVEL=INFO
      - OUTPUT_DIR=/app/output
      - TZ=Asia/Shanghai
    # Docker 日志轮转 — 防止长时间运行占满磁盘
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
