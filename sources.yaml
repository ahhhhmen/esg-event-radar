# ESG Event Radar — 垂直域供料源清单 v1
#
# 字段说明:
#   name        : 源名称（日志显示用）
#   url         : RSS feed URL
#   type        : rss | google_news
#                 google_news — Google News RSS 定向搜索流，需 URL 解密还原
#   tier        : 1=权威倡议组织  2=头部会展运营商  3=行业媒体/智库
#   region      : global | apac | emea | americas | cn
#   org         : 来源机构（写入 EventItem.source_org）
#   tags        : 主题标签（辅助 LLM 提取时提示上下文）
#   active      : false = 暂时屏蔽
#
# v0 → v1 变更说明:
#   Tier 1/2 倡议组织源（UNGC/WBCSD/CDP/SBTi 等）均无公开事件 RSS，
#   已移入 html_calendar 待后续爬虫模块，active: false。
#   替换为三轨混合策略：
#     轨道 B — 已验证可用的行业媒体 RSS（ESGToday / RI / CarbonBrief / Bloomberg）
#     轨道 C — Google News 定向查询（覆盖全域会议公告，信号最强）
# ──────────────────────────────────────────────────────────────────────────────

sources:

  # ══════════════════════════════════════════════════════════
  # 轨道 B — 行业媒体 RSS（已验证：200 + items > 0）
  # ══════════════════════════════════════════════════════════

  - name: "ESG Today"
    url: "https://www.esgtoday.com/feed/"
    type: rss
    tier: 3
    region: global
    org: "ESG Today"
    tags: ["ESG-news", "conference-announcement", "sustainability-events"]
    active: true

  - name: "Responsible Investor"
    url: "https://www.responsible-investor.com/feed/"
    type: rss
    tier: 3
    region: global
    org: "Responsible Investor"
    tags: ["ESG-investing", "PRI", "stewardship", "investor-events"]
    active: true

  - name: "Carbon Brief"
    url: "https://www.carbonbrief.org/feed"
    type: rss
    tier: 3
    region: global
    org: "Carbon Brief"
    tags: ["climate-policy", "COP", "IPCC", "climate-summit"]
    active: true

  - name: "Bloomberg Green"
    url: "https://feeds.bloomberg.com/green/news.rss"
    type: rss
    tier: 2
    region: global
    org: "Bloomberg Green"
    tags: ["green-finance", "ESG", "climate", "sustainability-summit"]
    active: true

  # ══════════════════════════════════════════════════════════
  # 轨道 C — Google News 定向查询（覆盖全域会议公告）
  # 参数: hl=en-US  gl=US  ceid=US:en
  # 搜索窗口由 FETCH_WINDOW_DAYS 控制（默认 8 天）
  # ══════════════════════════════════════════════════════════

  # -- 轨道 C: Google News 精准查询（高管级活动定向）--
  # 原则: 避免通配词（"sustainability conference" 返回地方性小会）
  #       锚定 Tier1 倡议组织名 + 已知头部峰会品牌 + CEO/CSO 角色词

  - name: "GNews: Tier1 Org Events"
    url: "https://news.google.com/rss/search?q=%28WBCSD+OR+%22UN+Global+Compact%22+OR+SBTi+OR+CDP+OR+GRI+OR+%22Climate+Group%22+OR+BSR%29+%28summit+OR+forum+OR+conference%29+2026&hl=en-US&gl=US&ceid=US:en"
    type: google_news
    tier: 1
    region: global
    org: "Google News"
    tags: ["WBCSD", "UNGC", "SBTi", "CDP", "GRI", "Tier1-orgs"]
    active: true

  - name: "GNews: Known ESG Summit Brands"
    url: "https://news.google.com/rss/search?q=%22GreenBiz+Forum%22+OR+%22BSR+Conference%22+OR+%22Sustainable+Brands%22+OR+%22Net+Zero+Festival%22+OR+%22Reuters+Events+Sustainability%22+2026&hl=en-US&gl=US&ceid=US:en"
    type: google_news
    tier: 2
    region: global
