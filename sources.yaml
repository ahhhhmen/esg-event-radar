# ESG Event Radar — 垂直域供料源清单 v1
#
# 字段说明:
#   name        : 源名称（日志显示用）
#   url         : RSS feed URL
#   type        : rss | google_news
#                 google_news — Google News RSS 定向搜索流，需 URL 解密还原
#   tier        : 1=权威倡议组织  2=头部会展运营商  3=行业媒体/智库
#   region      : global | apac | emea | americas | cn
#   org         : 来源机构（写入 EventItem.source_org）
#   tags        : 主题标签（辅助 LLM 提取时提示上下文）
#   active      : false = 暂时屏蔽
#
# v0 → v1.2 变更说明:
#   三轨混合策略已完整实现：
#     轨道 A — html_calendar 爬虫（8 个 Tier 1 组织官网 Events 页，active: true）
#     轨道 B — 行业媒体 RSS（ESGToday / RI / CarbonBrief / Bloomberg / Tambang）
#     轨道 C — Google News 定向查询（33 条精准查询，覆盖全域会议公告）
# ──────────────────────────────────────────────────────────────────────────────

